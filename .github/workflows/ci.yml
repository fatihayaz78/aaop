name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install poetry
          poetry install

      - name: Ruff check
        run: ruff check .

      - name: Mypy
        run: mypy . --ignore-missing-imports

      - name: Pytest
        run: pytest tests/ -v --cov=shared --cov-report=term-missing --cov-fail-under=80
